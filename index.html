<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصنع السلطة - جداول ملتصقة بالكامل (طباعة محسنة)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ========== إعادة تعيين صارم ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            direction: ltr;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 5px;
        }

        /* ========== الهيدر ========== */
        .header {
            background-color: #2E5E3A;
            color: white;
            padding: 8px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: #E6B905;
            color: #2E5E3A;
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .refresh-btn:hover {
            background: #d4a900;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ========== تبويبات ========== */
        .nav-tabs {
            display: flex;
            background-color: white;
            border-bottom: 2px solid #ccc;
            position: sticky;
            top: 48px;
            z-index: 999;
        }

        .nav-tab {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .nav-tab.active {
            border-bottom-color: #2E5E3A;
            color: #2E5E3A;
        }

        .nav-tab:hover {
            background-color: rgba(46, 94, 58, 0.05);
        }

        /* ========== المحتوى الرئيسي ========== */
        .main-content {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 90px);
            overflow: hidden;
        }

        /* ========== أزرار الطباعة والتحكم ========== */
        .print-controls {
            background-color: white;
            padding: 8px 12px;
            margin: 5px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 2px solid #eee;
        }

        .print-btn {
            background: #2E5E3A;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .print-btn:hover {
            background: #1e4a2a;
        }

        .print-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ========== فلتر الفروع ========== */
        .filter-section {
            background-color: white;
            padding: 8px 12px;
            margin-bottom: 5px;
            border-bottom: 2px solid #eee;
        }

        .filter-label {
            font-size: 14px;
            font-weight: 600;
            color: #2E5E3A;
            margin-bottom: 3px;
        }

        .branch-select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #8B9E7E;
            border-radius: 8px;
            font-size: 14px;
            background-color: white;
        }

        .branch-select:focus {
            outline: none;
            border-color: #2E5E3A;
        }

        /* ========== حاوية البيانات ========== */
        .data-container {
            flex: 1;
            overflow: auto;
            padding: 0;
            margin: 0;
        }

        /* ========== تقسيم الصفحة إلى عمودين بدون أي فواصل ========== */
        .split-view {
            display: flex;
            gap: 0;              /* لا مسافة بين العمودين */
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .column {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .column-header {
            background-color: #2E5E3A;
            color: white;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
            border-radius: 0;
            margin: 0;
        }

        .column-content {
            overflow-y: auto;
            padding: 0;
            margin: 0;
            flex: 1;
        }

        /* ========== أنماط الكروت والجداول - ملتصقة تماماً ========== */
        .card {
            background-color: white;
            border: 1px solid #000;
            border-radius: 0;
            margin: 0;
            padding: 0;
            border-top-width: 1px;
            border-bottom-width: 0;  /* الحد السفلي محذوف ليلتصق الذي يليه */
        }

        /* كل الكروت متلاصقة */
        .card {
            border-bottom: none;
        }

        /* الكارد الأخير له حد سفلي */
        .column-content .card:last-child {
            border-bottom: 1px solid #000;
        }

        /* تداخل الحدود: الكارد التالي يأتي مع حد علوي ويتداخل مع السابق بمقدار 1بكسل */
        .card + .card {
            margin-top: -1px;
            border-top: 1px solid #000;
        }

        /* إزالة أي مسافات داخلية */
        .card-header, .card-body, .table-container, .production-table {
            margin: 0;
            padding: 0;
        }

        .card-header {
            background-color: #d0d8d0;
            padding: 4px 8px;
            font-weight: 700;
            font-size: 14px;
            color: #000;
            text-align: center;
            border-bottom: 1px solid #000;
            margin: 0;
        }

        .card-body {
            padding: 0;
            margin: 0;
        }

        .table-container {
            overflow-x: auto;
            margin: 0;
            padding: 0;
        }

        .production-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            font-size: 13px;
            line-height: 1.2;
            margin: 0;
            padding: 0;
        }

        .production-table th,
        .production-table td {
            border: 1px solid #000;
            padding: 4px 6px;
            margin: 0;
            text-align: center;
            vertical-align: middle;
            font-size: 13px;
        }

        .production-table th:first-child,
        .production-table td:first-child {
            text-align: left;
            padding: 4px 8px;
            min-width: 150px;
            max-width: 200px;
            white-space: normal;
            word-wrap: break-word;
        }

        .production-table th {
            background-color: #e0e0e0;
            font-weight: 700;
            color: #000;
            white-space: nowrap;
        }

        .total-cell {
            background-color: #d0d0d0;
            font-weight: 700;
        }

        .product-name {
            font-weight: 600;
            line-height: 1.3;
            white-space: normal;
            word-wrap: break-word;
            font-size: 13px;
        }

        .product-package {
            font-size: 11px;
            color: #555;
            line-height: 1.2;
        }

        /* ========== أنماط الطباعة المحسنة - مع التصغير 60% والجداول ملتصقة ========== */
        @media print {
            .no-print {
                display: none !important;
            }
            
            body {
                background: white;
                margin: 0;
                padding: 0;
                direction: ltr;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
                /* تصغير المحتوى بنسبة 60% كما طلبت */
                transform: scale(0.6);
                transform-origin: top left;
                width: 166.67%; /* 1/0.6 */
            }
            
            .main-content {
                height: auto;
                overflow: visible;
            }
            
            .data-container {
                overflow: visible;
                padding: 0;
            }
            
            .split-view {
                display: flex;
                gap: 0;               /* بدون فراغات */
                page-break-after: avoid;
                margin: 0;
                padding: 0;
            }
            
            .column {
                flex: 1;
                page-break-inside: auto;
                margin: 0;
                padding: 0;
            }
            
            .column-content {
                page-break-inside: auto;
                margin: 0;
                padding: 0;
            }
            
            .column-header {
                font-size: 12px;
                padding: 3px;
                margin-bottom: 0;
                page-break-after: avoid;
                background-color: #2E5E3A !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .card {
                border: 1px solid black !important;
                margin: 0;
                padding: 0;
                border-radius: 0;
                page-break-inside: avoid;
                border-top-width: 1px;
                border-bottom-width: 0;  /* بدون حد سفلي أثناء الطباعة لضمان الالتصاق */
            }
            
            .card + .card {
                margin-top: -1px;
                border-top: 1px solid black !important;
            }
            
            .column-content .card:last-child {
                border-bottom: 1px solid black !important;
            }
            
            .card-header {
                padding: 3px 4px;
                font-size: 12px;
                border-bottom: 1px solid black !important;
                background-color: #d0d8d0 !important;
                color: black !important;
                font-weight: bold;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .production-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 11px !important;
                margin: 0;
                padding: 0;
            }
            
            .production-table th,
            .production-table td {
                border: 1px solid black !important;
                padding: 3px 4px;
                text-align: center;
                margin: 0;
                font-size: 11px !important;
            }
            
            .production-table th {
                background-color: #e0e0e0 !important;
                font-weight: bold !important;
                color: black !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .product-name {
                font-size: 11px !important;
                font-weight: 600 !important;
            }
            
            .product-package {
                font-size: 9px !important;
                color: #333 !important;
            }
            
            .total-cell {
                background-color: #d0d0d0 !important;
                font-weight: bold !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .print-page {
                page-break-after: always;
                margin: 0;
                padding: 0;
            }
            
            /* إزالة أي مسافات خفيفة */
            .column-content, .card, .card-body, .table-container, .production-table, tbody, tr, td, th {
                padding: 0 !important;
                margin: 0 !important;
            }
            
            /* ضبط الهوامش الداخلية للخلايا مع الحفاظ على التباعد البصري */
            .production-table td, .production-table th {
                padding: 3px 4px !important;
            }
            
            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                color-adjust: exact;
            }
            
            @page {
                size: A4 landscape;
                margin: 2mm;
            }
        }

        /* ========== حالات التحميل والفارغة ========== */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            flex-direction: column;
            gap: 10px;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(46, 94, 58, 0.2);
            border-left: 3px solid #2E5E3A;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 250px;
            text-align: center;
        }

        .empty-icon {
            font-size: 50px;
            color: #8B9E7E;
            margin-bottom: 10px;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .empty-state p {
            font-size: 14px;
            color: #666;
        }

        .hidden {
            display: none;
        }

        /* ========== رسائل التنبيه ========== */
        .message {
            padding: 8px 12px;
            margin: 5px 0;
            font-size: 14px;
            border-radius: 5px;
        }

        .success-message { 
            background: #efe; 
            color: #363; 
            border: 1px solid #cfc; 
        }
        
        .error-message { 
            background: #fee; 
            color: #c33; 
            border: 1px solid #fcc; 
        }
        
        .warning-message { 
            background: #ffecb5; 
            color: #7d6608; 
            border: 1px solid #ffd54f; 
        }

        /* ========== شريط التمرير ========== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #8B9E7E;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #2E5E3A;
        }

        /* ضمان عدم وجود مسافات غير مرغوب فيها */
        .column-content > *:first-child {
            margin-top: 0;
        }
        
        .column-content > *:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <!-- ========== الهيدر (يخفي عند الطباعة) ========== -->
    <header class="header no-print">
        <div class="container">
            <div class="header-content">
                <button id="refresh-btn" class="refresh-btn">
                    <i class="fas fa-sync-alt"></i> <span>تحديث البيانات</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ========== تبويبات التنقل ========== -->
    <div class="nav-tabs no-print">
        <div class="nav-tab active" data-tab="production">
            <i class="fas fa-industry"></i> <span>الإنتاج</span>
        </div>
        <div class="nav-tab" data-tab="supply">
            <i class="fas fa-truck-loading"></i> <span>توريد</span>
        </div>
    </div>

    <!-- ========== المحتوى الرئيسي ========== -->
    <main class="container">
        <!-- تبويب الإنتاج -->
        <div id="production-tab" class="tab-content">
            <div class="main-content">
                <div class="print-controls no-print">
                    <button id="print-all-production" class="print-btn">
                        <i class="fas fa-print"></i> طباعة الكل
                    </button>
                    <button id="load-sample-production" class="print-btn" style="background:#8B9E7E;">
                        <i class="fas fa-database"></i> بيانات تجريبية
                    </button>
                </div>

                <div class="filter-section no-print">
                    <label class="filter-label">الفرع:</label>
                    <select id="branch-filter-production" class="branch-select">
                        <option value="">كل الفروع</option>
                    </select>
                </div>

                <div id="message-container-production"></div>

                <div class="data-container" id="scroll-container-production">
                    <div id="loading-state-production" class="loading-spinner">
                        <div class="spinner"></div>
                        <span>جاري تحميل بيانات الإنتاج...</span>
                    </div>

                    <div id="empty-state-production" class="empty-state hidden">
                        <div class="empty-icon"><i class="fas fa-industry"></i></div>
                        <h3>لا توجد بيانات</h3>
                        <p>لم يتم العثور على بيانات من API</p>
                        <button id="try-sample-production" class="print-btn" style="margin-top:5px; background:#2E5E3A;">عرض بيانات تجريبية</button>
                    </div>

                    <div id="production-data" class="hidden"></div>
                </div>
            </div>
        </div>

        <!-- تبويب التوريد -->
        <div id="supply-tab" class="tab-content hidden">
            <div class="main-content">
                <div class="print-controls no-print">
                    <button id="print-all-supply" class="print-btn">
                        <i class="fas fa-print"></i> طباعة الكل
                    </button>
                    <button id="load-sample-supply" class="print-btn" style="background:#8B9E7E;">
                        <i class="fas fa-database"></i> بيانات تجريبية
                    </button>
                </div>

                <div class="filter-section no-print">
                    <label class="filter-label">الفرع:</label>
                    <select id="branch-filter-supply" class="branch-select">
                        <option value="">كل الفروع</option>
                    </select>
                </div>

                <div id="message-container-supply"></div>

                <div class="data-container" id="scroll-container-supply">
                    <div id="loading-state-supply" class="loading-spinner">
                        <div class="spinner"></div>
                        <span>جاري تحميل بيانات التوريد...</span>
                    </div>

                    <div id="empty-state-supply" class="empty-state hidden">
                        <div class="empty-icon"><i class="fas fa-truck-loading"></i></div>
                        <h3>لا توجد بيانات</h3>
                        <p>لم يتم العثور على بيانات من API</p>
                        <button id="try-sample-supply" class="print-btn" style="margin-top:5px; background:#2E5E3A;">عرض بيانات تجريبية</button>
                    </div>

                    <div id="supply-data" class="hidden"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // ========== حالة التطبيق ==========
        let appState = {
            currentTab: 'production',
            production: {
                items: [],
                filteredItems: [],
                allBranches: [],
                selectedBranch: '',
                apiUrl: 'https://ramadanv2026-production.up.railway.app/api/orderProduction/getOrderPof2Days',
                isLoading: false,
                useSampleData: false
            },
            supply: {
                items: [],
                filteredItems: [],
                allBranches: [],
                selectedBranch: '',
                apiUrl: 'https://ramadanv2026-production.up.railway.app/api/orderSupply/getOrderPof2Days',
                isLoading: false,
                useSampleData: false
            }
        };

        // ترتيب الفروع: M (شوران) أولاً، ثم S (سلطنة)، ثم A (عزيزية)
        const BRANCH_ORDER = ['M', 'S', 'A'];
        const BRANCH_NAMES = {
            'M': 'شوران M',
            'S': 'سلطنة S',
            'A': 'عزيزية A'
        };

        function sortBranches(branches) {
            return branches.sort((a, b) => {
                let codeA = a.charAt(0);
                let codeB = b.charAt(0);
                let indexA = BRANCH_ORDER.indexOf(codeA);
                let indexB = BRANCH_ORDER.indexOf(codeB);
                if (indexA === -1) indexA = BRANCH_ORDER.length;
                if (indexB === -1) indexB = BRANCH_ORDER.length;
                return indexA - indexB;
            });
        }

        $(document).ready(function() {
            // تحميل بيانات الإنتاج افتراضياً
            loadProductionData();
            setupEventListeners();
        });

        function setupEventListeners() {
            $('.nav-tab').click(function() {
                let tab = $(this).data('tab');
                $('.nav-tab').removeClass('active');
                $(this).addClass('active');
                $('.tab-content').addClass('hidden');
                $(`#${tab}-tab`).removeClass('hidden');
                appState.currentTab = tab;
            });

            $('#branch-filter-production').change(function() {
                appState.production.selectedBranch = $(this).val() || '';
                filterItems('production');
            });

            $('#branch-filter-supply').change(function() {
                appState.supply.selectedBranch = $(this).val() || '';
                filterItems('supply');
            });

            $('#refresh-btn').click(function() {
                if (appState.currentTab === 'production') {
                    loadProductionData();
                } else {
                    loadSupplyData();
                }
            });

            $('#load-sample-production, #try-sample-production').click(function() {
                loadSampleProductionData();
            });

            $('#load-sample-supply, #try-sample-supply').click(function() {
                loadSampleSupplyData();
            });

            $('#print-all-production').click(() => printAllTables('production'));
            $('#print-all-supply').click(() => printAllTables('supply'));
        }

        // ========== دوال تحميل البيانات ==========
        async function loadProductionData() {
            if (appState.production.isLoading) return;
            appState.production.isLoading = true;
            appState.production.useSampleData = false;
            $('#loading-state-production').removeClass('hidden');
            $('#production-data').addClass('hidden');
            $('#empty-state-production').addClass('hidden');
            $('#refresh-btn').prop('disabled', true);

            try {
                console.log('جاري تحميل بيانات الإنتاج من:', appState.production.apiUrl);
                let response;
                try {
                    response = await fetch(appState.production.apiUrl, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        if (data.status === 200 && data.data && data.data.length > 0) {
                            processProductionData(data);
                            showMessage('production', '✅ تم تحميل بيانات الإنتاج بنجاح', 'success');
                            return;
                        }
                    }
                } catch (e) { /* تجاهل */ }

                // محاولة عبر proxy
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
                response = await fetch(proxyUrl + appState.production.apiUrl);
                if (!response.ok) throw new Error(`خطأ في الشبكة: ${response.status}`);
                const data = await response.json();
                if (data.status === 200 && data.data && data.data.length > 0) {
                    processProductionData(data);
                    showMessage('production', '✅ تم تحميل بيانات الإنتاج عبر proxy', 'success');
                } else {
                    showMessage('production', '⚠️ لا توجد بيانات في API، استخدم البيانات التجريبية', 'warning');
                    $('#empty-state-production').removeClass('hidden');
                }
            } catch (error) {
                console.error(error);
                showMessage('production', '❌ فشل الاتصال بالخادم: ' + error.message, 'error');
                $('#empty-state-production').removeClass('hidden');
            } finally {
                appState.production.isLoading = false;
                $('#loading-state-production').addClass('hidden');
                $('#refresh-btn').prop('disabled', false);
            }
        }

        async function loadSupplyData() {
            if (appState.supply.isLoading) return;
            appState.supply.isLoading = true;
            appState.supply.useSampleData = false;
            $('#loading-state-supply').removeClass('hidden');
            $('#supply-data').addClass('hidden');
            $('#empty-state-supply').addClass('hidden');
            $('#refresh-btn').prop('disabled', true);

            try {
                let response;
                try {
                    response = await fetch(appState.supply.apiUrl, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        if (data.status === 200 && data.data && data.data.length > 0) {
                            processSupplyData(data);
                            showMessage('supply', '✅ تم تحميل بيانات التوريد بنجاح', 'success');
                            return;
                        }
                    }
                } catch (e) { /* تجاهل */ }

                const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
                response = await fetch(proxyUrl + appState.supply.apiUrl);
                if (!response.ok) throw new Error(`خطأ في الشبكة: ${response.status}`);
                const data = await response.json();
                if (data.status === 200 && data.data && data.data.length > 0) {
                    processSupplyData(data);
                    showMessage('supply', '✅ تم تحميل بيانات التوريد عبر proxy', 'success');
                } else {
                    showMessage('supply', '⚠️ لا توجد بيانات في API، استخدم البيانات التجريبية', 'warning');
                    $('#empty-state-supply').removeClass('hidden');
                }
            } catch (error) {
                console.error(error);
                showMessage('supply', '❌ فشل الاتصال بالخادم: ' + error.message, 'error');
                $('#empty-state-supply').removeClass('hidden');
            } finally {
                appState.supply.isLoading = false;
                $('#loading-state-supply').addClass('hidden');
                $('#refresh-btn').prop('disabled', false);
            }
        }

        // ========== بيانات تجريبية ==========
        function loadSampleProductionData() {
            appState.production.useSampleData = true;
            let sampleData = {
                data: [
                    { branch: { name: 'M شوران' }, mainProductOP: { name: '# المقرمشات سنوي' }, product: { name: 'نوسف غانم' }, package: '1500', packageUnit: { name: 'g' }, qty: 3, isSend: false },
                    { branch: { name: 'S سلطانة' }, mainProductOP: { name: '# المقرمشات سنوي' }, product: { name: 'نوسف غانم' }, package: '1500', packageUnit: { name: 'g' }, qty: 2, isSend: false },
                    { branch: { name: 'A عزيزية' }, mainProductOP: { name: '# المقرمشات سنوي' }, product: { name: 'نوسف غانم' }, package: '1500', packageUnit: { name: 'g' }, qty: 1, isSend: false },
                    { branch: { name: 'M شوران' }, mainProductOP: { name: '# المقرمشات سنوي' }, product: { name: 'صابر غانم' }, package: '3000', packageUnit: { name: 'g' }, qty: 1, isSend: false },
                    { branch: { name: 'S سلطانة' }, mainProductOP: { name: '# المقرمشات سنوي' }, product: { name: 'صابر غانم' }, package: '3000', packageUnit: { name: 'g' }, qty: 2, isSend: false },
                    { branch: { name: 'A عزيزية' }, mainProductOP: { name: '# المقرمشات سنوي' }, product: { name: 'صابر غانم' }, package: '3000', packageUnit: { name: 'g' }, qty: 1, isSend: false },
                    { branch: { name: 'A عزيزية' }, mainProductOP: { name: '# الصوصات شامية' }, product: { name: 'إيطالي سلف' }, package: '700', packageUnit: { name: 'g' }, qty: 7, isSend: false },
                    { branch: { name: 'M شوران' }, mainProductOP: { name: '# الصوصات شامية' }, product: { name: 'ديس رمان' }, package: '800', packageUnit: { name: 'g' }, qty: 14, isSend: false },
                    { branch: { name: 'S سلطانة' }, mainProductOP: { name: '# الصوصات شامية' }, product: { name: 'راش قزعة' }, package: '650', packageUnit: { name: 'g' }, qty: 7, isSend: false }
                ]
            };
            processProductionData(sampleData);
            showMessage('production', '✅ بيانات تجريبية: شوران، سلطنة، عزيزية', 'success');
        }

        function loadSampleSupplyData() {
            appState.supply.useSampleData = true;
            let sampleData = {
                data: [
                    { branch: { name: 'M شوران' }, mainProductOP: { name: '# خضروات' }, product: { name: 'طماطم' }, package: '10', packageUnit: { name: 'كيلو' }, qty: 50, isSend: false },
                    { branch: { name: 'S سلطانة' }, mainProductOP: { name: '# خضروات' }, product: { name: 'طماطم' }, package: '10', packageUnit: { name: 'كيلو' }, qty: 30, isSend: false },
                    { branch: { name: 'A عزيزية' }, mainProductOP: { name: '# خضروات' }, product: { name: 'طماطم' }, package: '10', packageUnit: { name: 'كيلو' }, qty: 20, isSend: false },
                    { branch: { name: 'M شوران' }, mainProductOP: { name: '# خضروات' }, product: { name: 'خيار' }, package: '10', packageUnit: { name: 'كيلو' }, qty: 40, isSend: false },
                    { branch: { name: 'S سلطانة' }, mainProductOP: { name: '# فواكه' }, product: { name: 'تفاح' }, package: '5', packageUnit: { name: 'كيلو' }, qty: 30, isSend: false },
                    { branch: { name: 'A عزيزية' }, mainProductOP: { name: '# فواكه' }, product: { name: 'موز' }, package: '3', packageUnit: { name: 'كيلو' }, qty: 25, isSend: false }
                ]
            };
            processSupplyData(sampleData);
            showMessage('supply', '✅ بيانات تجريبية للتوريد', 'success');
        }

        // ========== معالجة البيانات ==========
        function processProductionData(data) {
            let items = [], branches = new Set();
            (data.data || []).forEach(item => {
                if (!item.isSend) {
                    items.push({
                        name: item.product?.name || 'منتج',
                        package: item.package || '',
                        packageUnit: item.packageUnit?.name || '',
                        qty: parseFloat(item.qty) || 0,
                        category: item.mainProductOP?.name || 'غير مصنف',
                        branch: item.branch?.name || 'فرع',
                        branchCode: item.branch?.name || ''
                    });
                    branches.add(item.branch?.name || 'فرع');
                }
            });
            appState.production.items = items;
            appState.production.allBranches = sortBranches(Array.from(branches));
            updateBranchFilter('production');
            filterItems('production');
            $('#empty-state-production').addClass('hidden');
        }

        function processSupplyData(data) {
            let items = [], branches = new Set();
            (data.data || []).forEach(item => {
                if (!item.isSend) {
                    items.push({
                        name: item.product?.name || 'منتج',
                        package: item.package || '',
                        packageUnit: item.packageUnit?.name || '',
                        qty: parseFloat(item.qty) || 0,
                        category: item.mainProductOP?.name || 'غير مصنف',
                        branch: item.branch?.name || 'فرع',
                        branchCode: item.branch?.name || ''
                    });
                    branches.add(item.branch?.name || 'فرع');
                }
            });
            appState.supply.items = items;
            appState.supply.allBranches = sortBranches(Array.from(branches));
            updateBranchFilter('supply');
            filterItems('supply');
            $('#empty-state-supply').addClass('hidden');
        }

        function updateBranchFilter(type) {
            let select = $(`#branch-filter-${type}`);
            select.empty().append('<option value="">كل الفروع</option>');
            appState[type].allBranches.forEach(b => {
                let displayName = BRANCH_NAMES[b.charAt(0)] || b;
                select.append(`<option value="${b}">${displayName}</option>`);
            });
        }

        function filterItems(type) {
            let state = appState[type];
            if (state.selectedBranch) {
                state.filteredItems = state.items.filter(i => i.branch === state.selectedBranch);
            } else {
                state.filteredItems = [...state.items];
            }
            renderData(type);
        }

        function renderData(type) {
            let container = type === 'production' ? $('#production-data') : $('#supply-data');
            let state = appState[type];
            if (state.filteredItems.length === 0) {
                $(`#empty-state-${type}`).removeClass('hidden');
                container.addClass('hidden');
                return;
            }
            $(`#empty-state-${type}`).addClass('hidden');
            container.removeClass('hidden');

            let categories = {};
            state.filteredItems.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item);
            });
            let categoryList = Object.keys(categories);
            let midIndex = Math.ceil(categoryList.length / 2);
            let firstHalf = categoryList.slice(0, midIndex);
            let secondHalf = categoryList.slice(midIndex);

            let html = `
                <div class="split-view">
                    <div class="column">
                        <div class="column-header">القسم (1)</div>
                        <div class="column-content">
                            ${firstHalf.map(cat => buildCompactTable(cat, categories[cat])).join('')}
                        </div>
                    </div>
                    <div class="column">
                        <div class="column-header">القسم (2)</div>
                        <div class="column-content">
                            ${secondHalf.length ? secondHalf.map(cat => buildCompactTable(cat, categories[cat])).join('') : '<div style="text-align:center; color:#888; padding:20px;">لا توجد أقسام إضافية</div>'}
                        </div>
                    </div>
                </div>
            `;
            container.html(html);
        }

        function buildCompactTable(category, items) {
            let branchesSet = new Set(items.map(item => item.branch));
            let allBranchesInItems = sortBranches(Array.from(branchesSet));
            let products = {};
            items.forEach(item => {
                let key = item.name + '-' + item.package + '-' + item.packageUnit;
                if (!products[key]) {
                    products[key] = {
                        name: item.name,
                        package: item.package,
                        packageUnit: item.packageUnit,
                        branches: {}
                    };
                    allBranchesInItems.forEach(branch => { products[key].branches[branch] = 0; });
                }
                products[key].branches[item.branch] = (products[key].branches[item.branch] || 0) + item.qty;
            });
            let productList = Object.values(products).sort((a, b) => a.name.localeCompare(b.name));

            let branchHeaders = allBranchesInItems.map(branch => {
                let displayName = BRANCH_NAMES[branch.charAt(0)] || branch;
                return `<th>${displayName}</th>`;
            }).join('');

            return `
                <div class="card">
                    <div class="card-header">${category}</div>
                    <div class="card-body">
                        <div class="table-container">
                            <table class="production-table" cellspacing="0" cellpadding="0">
                                <thead><tr><th>المنتج</th>${branchHeaders}<th>الإجمالي</th></tr></thead>
                                <tbody>
                                    ${productList.map(p => {
                                        let total = 0;
                                        let branchCells = allBranchesInItems.map(branch => {
                                            let qty = p.branches[branch] || 0;
                                            total += qty;
                                            return `<td>${qty || '-'}</td>`;
                                        }).join('');
                                        return `<tr><td style="text-align:left;"><div class="product-name">${p.name}</div><div class="product-package">${p.package || ''} ${p.packageUnit || ''}</div></td>${branchCells}<td class="total-cell">${total || '-'}</td></tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function printAllTables(type) {
            let state = appState[type];
            if (state.filteredItems.length === 0) { alert('لا توجد بيانات للطباعة'); return; }

            let categories = {};
            state.filteredItems.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item);
            });
            let categoryList = Object.keys(categories);
            let title = type === 'production' ? 'تقرير الإنتاج' : 'تقرير التوريد';
            let date = new Date().toLocaleDateString('ar-EG');

            let printContent = `
                <html dir="ltr"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
                <style>
                    * { margin:0; padding:0; box-sizing:border-box; font-family:Cairo; }
                    body { background:white; margin:0; padding:0; direction:ltr; -webkit-print-color-adjust:exact; print-color-adjust:exact; transform:scale(0.6); transform-origin:top left; width:166.67%; }
                    .print-page { page-break-after:always; margin:0; padding:0; }
                    .split-view { display:flex; gap:0; margin:0; padding:0; }
                    .column { flex:1; margin:0; padding:0; }
                    .column-header { background:#2E5E3A !important; color:white !important; padding:3px; text-align:center; font-size:12px; }
                    .card { border:1px solid black !important; margin:0; padding:0; border-radius:0; page-break-inside:avoid; border-bottom:none; }
                    .card + .card { margin-top:-1px; border-top:1px solid black !important; }
                    .column-content .card:last-child { border-bottom:1px solid black !important; }
                    .card-header { background:#d0d8d0 !important; padding:3px 4px; text-align:center; font-weight:bold; font-size:12px; border-bottom:1px solid black !important; }
                    .production-table { width:100%; border-collapse:collapse; font-size:11px !important; }
                    .production-table th, .production-table td { border:1px solid black !important; padding:3px 4px; text-align:center; font-size:11px !important; }
                    .production-table th:first-child, .production-table td:first-child { text-align:left; }
                    .production-table th { background:#e0e0e0 !important; font-weight:bold !important; }
                    .product-name { font-weight:bold; font-size:11px !important; }
                    .product-package { font-size:9px !important; color:#333 !important; }
                    .total-cell { background:#d0d0d0 !important; font-weight:bold !important; }
                    @page { size:A4 landscape; margin:2mm; }
                </style></head>
                <body><div class="print-page"><div style="text-align:center; margin-bottom:2mm; font-size:14px; font-weight:bold;">${title} - ${date}</div>`;

            let midIndex = Math.ceil(categoryList.length / 2);
            let firstHalf = categoryList.slice(0, midIndex);
            let secondHalf = categoryList.slice(midIndex);
            printContent += '<div class="split-view"><div class="column"><div class="column-header">القسم (1)</div><div class="column-content">';
            firstHalf.forEach(cat => { printContent += buildCompactTable(cat, categories[cat]); });
            printContent += '</div></div><div class="column"><div class="column-header">القسم (2)</div><div class="column-content">';
            if (secondHalf.length) secondHalf.forEach(cat => { printContent += buildCompactTable(cat, categories[cat]); });
            printContent += '</div></div></div></div></body></html>';

            let printWindow = window.open('', '_blank');
            printWindow.document.write(printContent);
            printWindow.document.close();
            printWindow.focus();
            setTimeout(() => { printWindow.print(); }, 250);
        }

        function showMessage(type, message, messageType = 'info') {
            let container = $(`#message-container-${type}`);
            let className = messageType === 'success' ? 'success-message' : messageType === 'error' ? 'error-message' : 'warning-message';
            container.html(`<div class="message ${className}">${message}</div>`);
            setTimeout(() => container.empty(), 4000);
        }
    </script>
</body>
</html>
